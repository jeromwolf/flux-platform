<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>해사 도메인 온톨로지 탐색기</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Noto Sans KR',sans-serif;background:#0d1117;color:#e6edf3;overflow:hidden;height:100vh}
#app{display:flex;flex-direction:column;height:100vh}

/* Header */
#hdr{height:50px;background:#161b22;border-bottom:1px solid #30363d;display:flex;align-items:center;padding:0 16px;gap:16px;flex-shrink:0}
#hdr h1{font-size:15px;font-weight:700;color:#e6edf3}
.badge{font-size:11px;color:#7d8590;background:#21262d;padding:2px 8px;border-radius:10px}
#searchBox{margin-left:auto;padding:5px 10px;border-radius:6px;border:1px solid #30363d;background:#0d1117;color:#e6edf3;font-size:13px;width:200px}

/* Main */
#main{display:flex;flex:1;overflow:hidden}

/* Sidebar */
#side{width:220px;background:#161b22;border-right:1px solid #30363d;overflow-y:auto;flex-shrink:0;padding:8px}
.grp{display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:6px;cursor:pointer;font-size:12px;margin-bottom:2px}
.grp:hover{background:#21262d}
.grp .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.grp .name{flex:1}
.grp .cnt{color:#7d8590;font-size:11px}
.grp.off{opacity:0.35}
.grp .chk{width:14px;height:14px;border:1.5px solid #30363d;border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px}
.grp.on .chk{background:#2563eb;border-color:#2563eb;color:#fff}
.sep{height:1px;background:#30363d;margin:8px 0}
#stats{padding:8px;font-size:11px;color:#7d8590}

/* Canvas */
#canvasWrap{flex:1;position:relative;background:#0d1117}
#graph{width:100%;height:100%}
#loader{position:absolute;inset:0;background:#0d1117;display:flex;align-items:center;justify-content:center;z-index:5;transition:opacity 0.4s}
#loader.hide{opacity:0;pointer-events:none}

/* Detail */
#detail{height:180px;background:#161b22;border-top:1px solid #30363d;overflow-y:auto;padding:12px 16px;flex-shrink:0;font-size:12px}
#detail.empty{display:flex;align-items:center;justify-content:center;color:#7d8590}
.d-title{font-size:14px;font-weight:700;margin-bottom:8px}
.d-grid{display:flex;gap:24px;flex-wrap:wrap}
.d-col{min-width:200px}
.d-col h4{font-size:11px;color:#7d8590;margin-bottom:4px;text-transform:uppercase}
.d-row{display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid #21262d}
.d-key{color:#e6edf3}.d-val{color:#7d8590;font-family:monospace;font-size:11px}
.d-rel{padding:2px 0;color:#7d8590}
.d-rel span{color:#58a6ff}
</style>
</head>

// ── Node→Group mapping ──
const N2G={};
GROUPS.forEach(g=>g.entities.forEach(e=>{N2G[e]=g.id}));

// ── State ──
const visible={};
GROUPS.forEach(g=>{visible[g.id]=true});
let network,nodesDS,edgesDS,allN,allE;

// ── Sidebar ──
function buildSidebar(){
  const el=document.getElementById('side');
  let h='<div class="grp on" onclick="toggleAll()" id="allBtn"><div class="chk">✓</div><div class="name" style="font-weight:600">전체 선택</div></div><div class="sep"></div>';
  GROUPS.forEach(g=>{
    h+=`<div class="grp on" id="grp_${g.id}" onclick="toggle('${g.id}')">
      <div class="chk">✓</div>
      <div class="dot" style="background:${g.color}"></div>
      <div class="name">${g.label}</div>
    </div>`;
  });
  h+='<div class="sep"></div><div id="stats"></div>';
  el.innerHTML=h;
}

function toggle(id){
  visible[id]=!visible[id];
  const el=document.getElementById('grp_'+id);
  el.classList.toggle('on',visible[id]);
  el.classList.toggle('off',!visible[id]);
  applyFilter();
}

function toggleAll(){
  const allOn=Object.values(visible).every(v=>v);
  GROUPS.forEach(g=>{
    visible[g.id]=!allOn;
    const el=document.getElementById('grp_'+g.id);
    el.classList.toggle('on',!allOn);
    el.classList.toggle('off',allOn);
  });
  document.getElementById('allBtn').classList.toggle('on',!allOn);
  applyFilter();
}

function applyFilter(){
  if(!nodesDS)return;
  const updates=allN.map(n=>({id:n.id,hidden:!visible[n.group]}));
  nodesDS.update(updates);
  // hide edges where either end is hidden
  const hiddenSet=new Set(allN.filter(n=>!visible[n.group]).map(n=>n.id));
  const eUp=allE.map(e=>({id:e.id,hidden:hiddenSet.has(e.from)||hiddenSet.has(e.to)}));
  edgesDS.update(eUp);
  updateStats();
}

function updateStats(){
  const vn=allN.filter(n=>visible[n.group]).length;
  const hiddenSet=new Set(allN.filter(n=>!visible[n.group]).map(n=>n.id));
  const ve=allE.filter(e=>!hiddenSet.has(e.from)&&!hiddenSet.has(e.to)).length;
  document.getElementById('stats').innerHTML=`표시: ${vn} 노드 / ${ve} 관계`;
  document.getElementById('nodeCount').textContent=vn+' 엔티티';
  document.getElementById('edgeCount').textContent=ve+' 관계';
}

// ── Search ──
document.getElementById('searchBox').addEventListener('input',function(e){
  const q=e.target.value.trim().toLowerCase();
  if(!q||!network)return;
  const found=allN.find(n=>n.id.toLowerCase().includes(q)||(KO[n.id]||'').includes(q));
  if(found){
    if(!visible[found.group])toggle(found.group);
    network.focus(found.id,{scale:1.5,animation:{duration:500,easingFunction:'easeInOutCubic'}});
    network.selectNodes([found.id]);
    showDetail(found.id);
  }
});

// ── Detail panel ──
function showDetail(nodeId){
  const g=N2G[nodeId]||'';
  const color=(GROUPS.find(x=>x.id===g)||{}).color||'#888';
  const props=PROPS[nodeId];
  const outE=allE.filter(e=>e.from===nodeId);
  const inE=allE.filter(e=>e.to===nodeId&&e.from!==nodeId);

  const ko=KO[nodeId]?` (${KO[nodeId]})`:'';
  let h=`<div class="d-title"><span style="color:${color}">●</span> ${nodeId}${ko} <span style="color:#7d8590;font-size:12px">${g}</span></div><div class="d-grid">`;

  // Props
  h+='<div class="d-col"><h4>속성</h4>';
  if(props){
    Object.entries(props).forEach(([k,v])=>{h+=`<div class="d-row"><span class="d-key">${k}</span><span class="d-val">${v}</span></div>`});
  }else{h+='<div style="color:#7d8590">속성 정의 없음</div>'}
  h+='</div>';

  // Out
  h+=`<div class="d-col"><h4>→ 나가는 관계 (${outE.length})</h4>`;
  outE.forEach(e=>{
    const tc=(GROUPS.find(x=>x.id===N2G[e.to])||{}).color||'#888';
    h+=`<div class="d-rel">${e._label} → <span style="color:${tc}">${e.to}</span></div>`;
  });
  if(!outE.length)h+='<div style="color:#7d8590">없음</div>';
  h+='</div>';

  // In
  h+=`<div class="d-col"><h4>← 들어오는 관계 (${inE.length})</h4>`;
  inE.forEach(e=>{
    const fc=(GROUPS.find(x=>x.id===N2G[e.from])||{}).color||'#888';
    h+=`<div class="d-rel"><span style="color:${fc}">${e.from}</span> → ${e._label}</div>`;
  });
  if(!inE.length)h+='<div style="color:#7d8590">없음</div>';
  h+='</div></div>';

  const el=document.getElementById('detail');
  el.className='';
  el.innerHTML=h;
}

// ── Build & Init ──
function init(){
  if(typeof vis==='undefined')return;

  // Build nodes
  allN=[];
  GROUPS.forEach(g=>{
    g.entities.forEach(name=>{
      const isPar=PARENTS.has(name);
      const ko=KO[name];
      const lbl=ko?name+'\n('+ko+')':name;
      allN.push({
        id:name, label:lbl, group:g.id,
        color:{background:g.color+'22',border:g.color,
          highlight:{background:g.color+'55',border:g.color},
          hover:{background:g.color+'44',border:g.color}},
        font:{color:'#c9d1d9',size:isPar?13:10},
        size:isPar?24:12, borderWidth:isPar?2.5:1.5,
        shape:'dot', shadow:{enabled:true,color:g.color+'55',size:isPar?14:6,x:0,y:0},
        hidden:false
      });
    });
  });

  // Build edges
  allE=[];
  EDGES.forEach((e,i)=>{
    const fc=(GROUPS.find(x=>x.id===N2G[e.f])||{}).color||'#555';
    allE.push({
      id:i, from:e.f, to:e.t, _label:e.l,
      label:e.l, color:{color:fc+'66',highlight:fc,hover:fc+'aa'},
      font:{color:'#7d8590',size:8,strokeWidth:0,background:'#0d1117cc'},
      arrows:{to:{enabled:true,scaleFactor:0.5}},
      width:1, selectionWidth:2,
      smooth:e.f===e.t?{enabled:true,type:'curvedCW',roundness:0.4}:{enabled:true,type:'dynamic'},
      hidden:false
    });
  });

  nodesDS=new vis.DataSet(allN);
  edgesDS=new vis.DataSet(allE);

  const container=document.getElementById('graph');
  network=new vis.Network(container,{nodes:nodesDS,edges:edgesDS},{
    physics:{
      enabled:true, solver:'forceAtlas2Based',
      forceAtlas2Based:{gravitationalConstant:-60,centralGravity:0.008,springLength:120,springConstant:0.06,damping:0.5,avoidOverlap:0.6},
      stabilization:{enabled:true,iterations:250,fit:true},
      maxVelocity:50, minVelocity:0.5
    },
    interaction:{hover:true,tooltipDelay:200,hideEdgesOnDrag:true,zoomView:true},
    layout:{improvedLayout:false}
  });

  network.once('stabilizationIterationsDone',()=>{
    network.setOptions({physics:{stabilization:false,maxVelocity:25,forceAtlas2Based:{damping:0.8}}});
    const ld=document.getElementById('loader');
    ld.classList.add('hide');
  });

  network.on('click',function(p){
    if(p.nodes.length>0)showDetail(p.nodes[0]);
  });

  network.on('doubleClick',function(){
    network.fit({animation:{duration:400,easingFunction:'easeInOutCubic'}});
  });

  updateStats();
}

buildSidebar();
init();
</script>
