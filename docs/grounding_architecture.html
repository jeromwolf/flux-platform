<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">

  <title>지식그래프 기반 그라운딩 아키텍처 — IMSP</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0f1e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 1200px;
      width: 100%;
    }
    svg {
      width: 100%;
      height: auto;
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">

          <stop offset="100%" stop-color="#7c3a00" stop-opacity="0.0"/>

        <linearGradient id="layerGround" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#1a4a47" stop-opacity="0.0"/>

          <stop offset="70%" stop-color="#1a4a47" stop-opacity="0.25"/>
          <stop offset="100%" stop-color="#1a4a47" stop-opacity="0.0"/>
        </linearGradient>
        <linearGradient id="layerRAG" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#1a3555" stop-opacity="0.0"/>

          <stop offset="90%" stop-color="#1a3555" stop-opacity="0.22"/>
          <stop offset="100%" stop-color="#1a3555" stop-opacity="0.0"/>
        </linearGradient>
        <linearGradient id="layerKG" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#0f2e1e" stop-opacity="0.0"/>
          <stop offset="10%" stop-color="#0f2e1e" stop-opacity="0.28"/>
          <stop offset="90%" stop-color="#0f2e1e" stop-opacity="0.28"/>
          <stop offset="100%" stop-color="#0f2e1e" stop-opacity="0.0"/>
        </linearGradient>
        <linearGradient id="layerReady" x1="0" y1="0" x2="1" y2="0">

          <stop offset="10%" stop-color="#1a3040" stop-opacity="0.22"/>
          <stop offset="90%" stop-color="#1a3040" stop-opacity="0.22"/>
          <stop offset="100%" stop-color="#1a3040" stop-opacity="0.0"/>
        </linearGradient>
        <linearGradient id="cardAI" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#c05621"/>
          <stop offset="100%" stop-color="#92400e"/>
        </linearGradient>
        <linearGradient id="cardAgent" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#9c6f1e"/>
          <stop offset="100%" stop-color="#6b4c14"/>
        </linearGradient>
        <linearGradient id="cardGround" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#2c7a7b"/>
          <stop offset="100%" stop-color="#1d5a5b"/>
        </linearGradient>
        <linearGradient id="cardRAG" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#2b6cb0"/>
          <stop offset="100%" stop-color="#1a4a7e"/>
        </linearGradient>
        <linearGradient id="cardGraphRAG" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#0987a0"/>
          <stop offset="100%" stop-color="#065666"/>
        </linearGradient>
        <linearGradient id="cardOntology" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#553c9a"/>
          <stop offset="100%" stop-color="#3b2677"/>
        </linearGradient>
        <linearGradient id="cardKG" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#276749"/>
          <stop offset="100%" stop-color="#1c4d35"/>

        <linearGradient id="cardMeta" x1="0" y1="0" x2="0" y2="1">

        <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#68d391"/>
        </marker>
        <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">

        </marker>

          <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
        </filter>

          <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#f6ad55" flood-opacity="0.5"/>
        </filter>
        <filter id="shadowGlowYellow" x="-20%" y="-20%" width="140%" height="160%">
          <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#ecc94b" flood-opacity="0.4"/>
        </filter>
        <filter id="shadowGlowCyan" x="-20%" y="-20%" width="140%" height="160%">
          <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#4fd1c5" flood-opacity="0.4"/>
        </filter>
        <filter id="shadowGlowGreen" x="-20%" y="-20%" width="140%" height="160%">
          <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#68d391" flood-opacity="0.35"/>

          <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#63b3ed" flood-opacity="0.35"/>

      </defs>

      <!-- BACKGROUND -->
      <rect width="1200" height="1060" fill="url(#bgGrad)"/>

      <!-- Grid -->
      <g opacity="0.04" stroke="#ffffff" stroke-width="0.5">
        <line x1="0" y1="100" x2="1200" y2="100"/><line x1="0" y1="200" x2="1200" y2="200"/>
        <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="400" x2="1200" y2="400"/>
        <line x1="0" y1="500" x2="1200" y2="500"/><line x1="0" y1="600" x2="1200" y2="600"/>
        <line x1="0" y1="700" x2="1200" y2="700"/><line x1="0" y1="800" x2="1200" y2="800"/>
        <line x1="0" y1="900" x2="1200" y2="900"/><line x1="0" y1="1000" x2="1200" y2="1000"/>
        <line x1="100" y1="0" x2="100" y2="1060"/><line x1="200" y1="0" x2="200" y2="1060"/>
        <line x1="300" y1="0" x2="300" y2="1060"/><line x1="400" y1="0" x2="400" y2="1060"/>
        <line x1="500" y1="0" x2="500" y2="1060"/><line x1="600" y1="0" x2="600" y2="1060"/>
        <line x1="700" y1="0" x2="700" y2="1060"/><line x1="800" y1="0" x2="800" y2="1060"/>
        <line x1="900" y1="0" x2="900" y2="1060"/><line x1="1000" y1="0" x2="1000" y2="1060"/>
        <line x1="1100" y1="0" x2="1100" y2="1060"/>
      </g>

      <!-- TITLE -->
      <text x="600" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#e2e8f0" letter-spacing="1">지식그래프 기반 AI 그라운딩 아키텍처</text>
      <text x="600" y="64" text-anchor="middle" font-size="13" fill="#718096" letter-spacing="0.5">Knowledge Graph–Grounded AI Agent Pipeline</text>
      <line x1="200" y1="75" x2="1000" y2="75" stroke="#2d3748" stroke-width="1"/>

      <!-- ============ LAYER BANDS ============ -->
      <!-- Layer 7: Source -->
      <rect x="60" y="938" width="1080" height="72" rx="8" fill="url(#layerKG)" opacity="0.5"/>
      <!-- Layer 6: AI-Ready Data -->
      <rect x="60" y="838" width="1080" height="90" rx="8" fill="url(#layerReady)"/>
      <!-- Layer 5: KG Foundation -->
      <rect x="60" y="618" width="1080" height="210" rx="8" fill="url(#layerKG)"/>
      <!-- Layer 4: RAG/GraphRAG -->
      <rect x="60" y="448" width="1080" height="160" rx="8" fill="url(#layerRAG)"/>
      <!-- Layer 3: Grounding -->
      <rect x="180" y="308" width="840" height="130" rx="8" fill="url(#layerGround)"/>
      <!-- Layer 2: Agent -->
      <rect x="250" y="198" width="700" height="100" rx="8" fill="url(#layerAgent)"/>
      <!-- Layer 1: AI Answer -->
      <rect x="340" y="88" width="520" height="100" rx="8" fill="url(#layerAI)"/>

      <text x="1158" y="378" text-anchor="end" font-size="10" fill="#4a5568" font-weight="500" letter-spacing="1">LAYER 3</text>
      <text x="1158" y="530" text-anchor="end" font-size="10" fill="#4a5568" font-weight="500" letter-spacing="1">LAYER 4</text>
      <text x="1158" y="720" text-anchor="end" font-size="10" fill="#4a5568" font-weight="500" letter-spacing="1">LAYER 5</text>
      <text x="1158" y="880" text-anchor="end" font-size="10" fill="#4a5568" font-weight="500" letter-spacing="1">LAYER 6</text>
      <text x="1158" y="978" text-anchor="end" font-size="10" fill="#4a5568" font-weight="500" letter-spacing="1">LAYER 7</text>

      <text x="600" y="148" text-anchor="middle" font-size="12" fill="#fde68a">Grounded Generation</text>
      <text x="600" y="168" text-anchor="middle" font-size="11" fill="#fbbf24" opacity="0.85">환각(Hallucination) 없는 신뢰 답변</text>

      <rect x="310" y="205" width="580" height="86" rx="14" fill="url(#cardAgent)" filter="url(#shadowGlowYellow)" stroke="#ecc94b" stroke-width="1.5" stroke-opacity="0.6"/>
      <!-- Icon: robot/agent -->
      <g transform="translate(342, 242)">
        <rect x="-12" y="-14" width="24" height="18" rx="4" fill="none" stroke="#faf089" stroke-width="1.8"/>
        <circle cx="-5" cy="-6" r="2.5" fill="#faf089"/>
        <circle cx="5" cy="-6" r="2.5" fill="#faf089"/>

        <path d="M0,-16 L12,-8 L12,4 Q12,14 0,18 Q-12,14 -12,4 L-12,-8 Z" fill="none" stroke="#81e6d9" stroke-width="2"/>

      </g>
      <text x="600" y="347" text-anchor="middle" font-size="17" font-weight="700" fill="#e6fffa">그라운딩 (Grounding)</text>

      <text x="600" y="387" text-anchor="middle" font-size="11" fill="#4fd1c5" opacity="0.8">RAG 문서 컨텍스트 + GraphRAG 추론 컨텍스트 → LLM 프롬프트</text>
      <text x="600" y="406" text-anchor="middle" font-size="11" fill="#4fd1c5" opacity="0.8">사실 근거 기반 생성 · 출처 추적 가능</text>

      <!-- ============ LAYER 4: RAG + GraphRAG ============ -->

      <g transform="translate(134, 514)">
        <rect x="-10" y="-16" width="14" height="18" rx="2" fill="none" stroke="#90cdf4" stroke-width="1.8"/>
        <line x1="-8" y1="-10" x2="1" y2="-10" stroke="#90cdf4" stroke-width="1.2"/>
        <line x1="-8" y1="-5" x2="1" y2="-5" stroke="#90cdf4" stroke-width="1.2"/>

        <circle cx="6" cy="5" r="5" fill="none" stroke="#90cdf4" stroke-width="1.8"/>

      <text x="310" y="492" text-anchor="middle" font-size="17" font-weight="700" fill="#ebf8ff">RAG</text>
      <text x="310" y="512" text-anchor="middle" font-size="12" fill="#90cdf4">Retrieval-Augmented Generation</text>
      <text x="310" y="532" text-anchor="middle" font-size="11" fill="#63b3ed" opacity="0.85">문서 청크 벡터 임베딩 · 유사도 검색</text>
      <text x="310" y="549" text-anchor="middle" font-size="11" fill="#63b3ed" opacity="0.85">BM25 + Dense Retrieval 하이브리드</text>
      <text x="310" y="573" text-anchor="middle" font-size="10.5" fill="#4299e1" opacity="0.75">입력: 질의(Query) → 출력: 관련 문서 청크</text>

      <!-- GraphRAG -->
      <rect x="680" y="460" width="420" height="132" rx="14" fill="url(#cardGraphRAG)" filter="url(#shadowCard)" stroke="#76e4f7" stroke-width="1.5" stroke-opacity="0.6"/>
      <g transform="translate(714, 514)">
        <circle cx="0" cy="-12" r="5" fill="none" stroke="#9decf9" stroke-width="1.8"/>
        <circle cx="-11" cy="6" r="5" fill="none" stroke="#9decf9" stroke-width="1.8"/>
        <circle cx="11" cy="6" r="5" fill="none" stroke="#9decf9" stroke-width="1.8"/>
        <line x1="-2.5" y1="-7.5" x2="-8.5" y2="1.5" stroke="#9decf9" stroke-width="1.5"/>
        <line x1="2.5" y1="-7.5" x2="8.5" y2="1.5" stroke="#9decf9" stroke-width="1.5"/>
        <line x1="-6" y1="6" x2="6" y2="6" stroke="#9decf9" stroke-width="1.5"/>
      </g>
      <text x="890" y="492" text-anchor="middle" font-size="17" font-weight="700" fill="#e0f7fa">GraphRAG</text>
      <text x="890" y="512" text-anchor="middle" font-size="12" fill="#9decf9">Graph-based Retrieval &amp; Reasoning</text>
      <text x="890" y="532" text-anchor="middle" font-size="11" fill="#76e4f7" opacity="0.85">KG 엔티티 · 관계 그래프 순회</text>
      <text x="890" y="549" text-anchor="middle" font-size="11" fill="#76e4f7" opacity="0.85">다단계 추론 · 서브그래프 추출</text>
      <text x="890" y="573" text-anchor="middle" font-size="10.5" fill="#0bc5ea" opacity="0.75">입력: 질의(Query) → 출력: 추론 경로 + 사실</text>

      <!-- ============ LAYER 5: KG FOUNDATION ============ -->

      <rect x="80" y="632" width="280" height="140" rx="14" fill="url(#cardOntology)" filter="url(#shadowCard)" stroke="#b794f4" stroke-width="1.5" stroke-opacity="0.6"/>
      <g transform="translate(110, 686)">
        <rect x="-8" y="-16" width="16" height="10" rx="2" fill="none" stroke="#d6bcfa" stroke-width="1.8"/>

        <line x1="-10" y1="2" x2="10" y2="2" stroke="#d6bcfa" stroke-width="1.5"/>

      <text x="220" y="660" text-anchor="middle" font-size="16" font-weight="700" fill="#faf5ff">온톨로지</text>
      <text x="220" y="678" text-anchor="middle" font-size="11.5" fill="#d6bcfa">Ontology</text>
      <text x="220" y="700" text-anchor="middle" font-size="10.5" fill="#b794f4" opacity="0.9">개념 분류 · 관계 공리 정의</text>
      <text x="220" y="717" text-anchor="middle" font-size="10.5" fill="#b794f4" opacity="0.9">도메인 스키마 · SHACL 제약</text>
      <text x="220" y="734" text-anchor="middle" font-size="10" fill="#9f7aea" opacity="0.75">OWL/RDFS 기반 의미 체계</text>
      <text x="220" y="751" text-anchor="middle" font-size="10" fill="#9f7aea" opacity="0.75">KG 구조의 청사진 역할</text>

      <!-- KG (center) -->
      <rect x="420" y="625" width="360" height="155" rx="14" fill="url(#cardKG)" filter="url(#shadowGlowGreen)" stroke="#68d391" stroke-width="2" stroke-opacity="0.7"/>
      <g transform="translate(452, 688)">
        <ellipse cx="0" cy="-18" rx="13" ry="5" fill="none" stroke="#9ae6b4" stroke-width="1.8"/>
        <line x1="-13" y1="-18" x2="-13" y2="0" stroke="#9ae6b4" stroke-width="1.8"/>
