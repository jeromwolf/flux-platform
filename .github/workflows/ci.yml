name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install mypy pydantic types-requests
      - run: mypy core/kg/ --ignore-missing-imports --no-error-summary || true

  test:
    name: Python Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install httpx
      - name: Run unit tests
        run: |
          PYTHONPATH=.:core:domains python -m pytest tests/ -m unit -v --tb=short --junitxml=test-results.xml
      - name: Run E2E tests
        run: |
          PYTHONPATH=.:core:domains python -m pytest tests/e2e/test_e2e_pipeline.py -v --tb=short
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-py${{ matrix.python-version }}
          path: test-results.xml

  test-coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install httpx
      - name: Run tests with coverage
        run: |
          PYTHONPATH=.:core:domains python -m pytest tests/ -m unit --cov=core --cov=domains --cov=agent --cov=rag --cov=gateway --cov-report=xml --cov-report=term-missing --tb=short
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  ui-build:
    name: UI Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      neo4j:
        image: neo4j:5.26.0-community
        env:
          NEO4J_AUTH: neo4j/testpassword
          NEO4J_PLUGINS: '["apoc"]'
        ports:
          - 7687:7687
          - 7474:7474
        options: >-
          --health-cmd "cypher-shell -u neo4j -p testpassword 'RETURN 1'"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 10
          --health-start-period 30s
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install httpx
      - name: Wait for Neo4j
        run: |
          for i in {1..30}; do
            python -c "from neo4j import GraphDatabase; d = GraphDatabase.driver('bolt://localhost:7687', auth=('neo4j', 'testpassword')); d.verify_connectivity(); d.close(); print('Connected')" && break
            echo "Waiting for Neo4j... ($i)"
            sleep 2
          done
      - name: Run integration tests
        env:
          NEO4J_TEST_URI: bolt://localhost:7687
          NEO4J_TEST_USER: neo4j
          NEO4J_TEST_PASSWORD: testpassword
        run: |
          PYTHONPATH=.:core:domains python -m pytest tests/integration/test_neo4j_integration.py -m integration -v --tb=short

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Core API image
        run: docker build -f infra/docker/Dockerfile.core -t imsp/kg-api:ci .
      - name: Build Gateway image
        run: docker build -f infra/docker/Dockerfile.gateway -t imsp/gateway:ci .
