services:
  # ===========================================================================
  # Neo4j - Knowledge Graph Database
  # ===========================================================================
  neo4j:
    image: neo4j:5.26.0-community
    container_name: maritime-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # Neo4j Browser
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:?Set NEO4J_PASSWORD in .env}
      NEO4J_PLUGINS: '["apoc", "n10s"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*,n10s.*
      NEO4J_dbms_security_procedures_allowlist: apoc.*,n10s.*
      NEO4J_server_memory_heap_initial__size: 1G
      NEO4J_server_memory_heap_max__size: 1G
      NEO4J_server_memory_pagecache_size: 1G
      NEO4J_dbms_directories_import: /import
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_plugins:/plugins
      - neo4j_import:/import
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "${NEO4J_USER:-neo4j}", "-p", "${NEO4J_PASSWORD:?Set NEO4J_PASSWORD in .env}", "RETURN 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ===========================================================================
  # Maritime KG API - FastAPI REST API
  # ===========================================================================
  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.core
    container_name: maritime-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:?Set NEO4J_PASSWORD in .env}
      NEO4J_DATABASE: ${NEO4J_DATABASE:-neo4j}
      ENV: ${ENV:-production}
      APP_API_KEY: ${APP_API_KEY:-}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5180,http://localhost:8080}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  # ===========================================================================
  # Keycloak DB - PostgreSQL for Keycloak
  # ===========================================================================
  keycloak-db:
    image: postgres:14.4
    container_name: imsp-keycloak-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: ${KC_DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD:-postgres}
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KC_DB_USERNAME:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ===========================================================================
  # Keycloak - Identity & Access Management
  # ===========================================================================
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    container_name: imsp-keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: ${KC_DB_USERNAME:-postgres}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:-postgres}
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    ports:
      - "8180:8080"
    volumes:
      - ../keycloak/realm-imsp.json:/opt/keycloak/data/import/realm-imsp.json:ro
    depends_on:
      keycloak-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # ===========================================================================
  # API Gateway - Unified entry point (auth, rate-limit, routing)
  # ===========================================================================
  gateway:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.gateway
    container_name: imsp-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      api:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      API_BASE_URL: http://api:8000
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-imsp}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-imsp-api}
      GATEWAY_PORT: "8080"
      ENV: ${ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5180}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ===========================================================================
  # Activepieces - Workflow Automation Engine
  # ===========================================================================
  activepieces:
    image: ghcr.io/activepieces/activepieces:0.78.0
    container_name: maritime-activepieces
    restart: unless-stopped
    ports:
      - "8081:80"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Engine settings
      AP_ENGINE_EXECUTABLE_PATH: dist/packages/engine/main.js
      AP_EXECUTION_MODE: UNSANDBOXED
      # Frontend URL (change for production)
      AP_FRONTEND_URL: ${AP_FRONTEND_URL:-http://localhost:8081}
      # Security keys (generate with: openssl rand -hex 16/32)
      AP_ENCRYPTION_KEY: ${AP_ENCRYPTION_KEY:?Set AP_ENCRYPTION_KEY in .env}
      AP_JWT_SECRET: ${AP_JWT_SECRET:?Set AP_JWT_SECRET in .env}
      # PostgreSQL connection
      AP_POSTGRES_HOST: postgres
      AP_POSTGRES_PORT: 5432
      AP_POSTGRES_DATABASE: activepieces
      AP_POSTGRES_USERNAME: ${AP_POSTGRES_USERNAME:-postgres}
      AP_POSTGRES_PASSWORD: ${AP_POSTGRES_PASSWORD:?Set AP_POSTGRES_PASSWORD in .env}
      AP_POSTGRES_USE_SSL: "false"
      # Redis connection
      AP_REDIS_HOST: redis
      AP_REDIS_PORT: 6379
      # Pieces configuration
      AP_PIECES_SOURCE: CLOUD_AND_DB
      AP_PIECES_SYNC_MODE: OFFICIAL_AUTO
      # Limits
      AP_WEBHOOK_TIMEOUT_SECONDS: 30
      AP_TRIGGER_DEFAULT_POLL_INTERVAL: 5
      AP_FLOW_TIMEOUT_SECONDS: 600
    volumes:
      - activepieces_cache:/usr/src/app/cache

  # ===========================================================================
  # PostgreSQL - Activepieces Metadata Database
  # ===========================================================================
  postgres:
    image: postgres:14.4
    container_name: maritime-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: activepieces
      POSTGRES_USER: ${AP_POSTGRES_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${AP_POSTGRES_PASSWORD:?Set AP_POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AP_POSTGRES_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================================================
  # Redis - Activepieces Job Queue (BullMQ)
  # ===========================================================================
  redis:
    image: redis:7.0.7
    container_name: maritime-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================================================
  # Prometheus - Metrics Collection
  # ===========================================================================
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: maritime-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ===========================================================================
  # Grafana - Monitoring Dashboards
  # ===========================================================================
  grafana:
    image: grafana/grafana:10.4.0
    container_name: maritime-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ../grafana/provisioning:/etc/grafana/provisioning:ro
      - ../grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy

volumes:
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
  neo4j_plugins:
    driver: local
  neo4j_import:
    driver: local
  keycloak_db_data:
    driver: local
  activepieces_cache:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
