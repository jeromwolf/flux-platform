services:
  # ===========================================================================
  # Neo4j - Knowledge Graph Database
  # ===========================================================================
  neo4j:
    image: neo4j:5.26.0-community
    container_name: maritime-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # Neo4j Browser
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:?Set NEO4J_PASSWORD in .env}
      NEO4J_PLUGINS: '["apoc", "n10s"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*,n10s.*
      NEO4J_dbms_security_procedures_allowlist: apoc.*,n10s.*
      NEO4J_server_memory_heap_initial__size: 1G
      NEO4J_server_memory_heap_max__size: 1G
      NEO4J_server_memory_pagecache_size: 1G
      NEO4J_dbms_directories_import: /import
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_plugins:/plugins
      - neo4j_import:/import
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "${NEO4J_USER:-neo4j}", "-p", "${NEO4J_PASSWORD:?Set NEO4J_PASSWORD in .env}", "RETURN 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ===========================================================================
  # Maritime KG API - FastAPI REST API
  # ===========================================================================
  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.core
    container_name: maritime-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:?Set NEO4J_PASSWORD in .env}
      NEO4J_DATABASE: ${NEO4J_DATABASE:-neo4j}
      ENV: ${ENV:-production}
      APP_API_KEY: ${APP_API_KEY:-}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5180,http://localhost:8080}
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DATABASE: imsp
      REDIS_URL: redis://:${REDIS_PASSWORD:-imsp-redis-2026}@redis:6379/1
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      QDRANT_COLLECTION: imsp_documents
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  # ===========================================================================
  # Keycloak DB - PostgreSQL for Keycloak
  # ===========================================================================
  keycloak-db:
    image: postgres:14.4
    container_name: imsp-keycloak-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: ${KC_DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD:-postgres}
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KC_DB_USERNAME:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ===========================================================================
  # Keycloak - Identity & Access Management
  # ===========================================================================
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    container_name: imsp-keycloak
    restart: unless-stopped
    # 개발 전용: start-dev는 TLS/hostname 검증 없이 실행됨 (프로덕션 K8s는 keycloak-patch.yaml 참조)
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: ${KC_DB_USERNAME:-postgres}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:-postgres}
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    ports:
      - "8180:8080"
    volumes:
      - ../keycloak/realm-imsp.json:/opt/keycloak/data/import/realm-imsp.json:ro
    depends_on:
      keycloak-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # ===========================================================================
  # API Gateway - Unified entry point (auth, rate-limit, routing)
  # ===========================================================================
  gateway:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.gateway
    container_name: imsp-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      api:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      API_BASE_URL: http://api:8000
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-imsp}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-imsp-api}
      GATEWAY_PORT: "8080"
      ENV: ${ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5180}
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ===========================================================================
  # Zipkin - Distributed Tracing
  # ===========================================================================
  zipkin:
    image: openzipkin/zipkin:3.1
    container_name: imsp-zipkin
    restart: unless-stopped
    ports:
      - "9411:9411"
    environment:
      # Development: in-memory (traces lost on restart)
      # Production: set ZIPKIN_STORAGE_TYPE=elasticsearch and deploy ES
      # See infra/k8s/prod/zipkin-patch.yaml for K8s prod config
      STORAGE_TYPE: ${ZIPKIN_STORAGE_TYPE:-mem}
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9411/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ===========================================================================
  # Workflow Engine (Argo Workflow — K8s only, not in docker-compose)
  # ===========================================================================
  # Argo Workflow runs natively on Kubernetes.
  # For local development, workflows are tested via the FastAPI /api/v1/workflows endpoints.
  # See infra/k8s/ for Argo deployment manifests.

  # ===========================================================================
  # PostgreSQL - IMSP Platform Database
  # ===========================================================================
  postgres:
    image: postgres:14.4
    container_name: maritime-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-imsp}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../postgres/init-imsp-db.sh:/docker-entrypoint-initdb.d/02-create-imsp-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================================================
  # Redis - Rate Limiting & Cache
  # ===========================================================================
  redis:
    image: redis:7.0.7
    container_name: maritime-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-imsp-redis-2026}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-imsp-redis-2026}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-imsp-redis-2026}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================================================
  # Qdrant - Vector Database
  # ===========================================================================
  qdrant:
    image: qdrant/qdrant:v1.12.1
    container_name: imsp-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: "6334"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ===========================================================================
  # Prometheus - Metrics Collection
  # ===========================================================================
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: maritime-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ===========================================================================
  # AlertManager - Alert Routing & Notification
  # ===========================================================================
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: imsp-alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ../alertmanager:/etc/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9093/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ===========================================================================
  # Loki - Log Aggregation
  # ===========================================================================
  loki:
    image: grafana/loki:2.9.4
    container_name: imsp-loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - imsp-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ===========================================================================
  # Promtail - Log Collector (ships container logs to Loki)
  # ===========================================================================
  promtail:
    image: grafana/promtail:2.9.4
    container_name: imsp-promtail
    volumes:
      - ./loki/promtail-config.yml:/etc/promtail/config.yml
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - imsp-network
    restart: unless-stopped
    depends_on:
      - loki

  # ===========================================================================
  # Grafana - Monitoring Dashboards
  # ===========================================================================
  grafana:
    image: grafana/grafana:10.4.0
    container_name: maritime-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      prometheus:
        condition: service_healthy

volumes:
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
  neo4j_plugins:
    driver: local
  neo4j_import:
    driver: local
  keycloak_db_data:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local
  qdrant_data:
    driver: local
  prometheus_data:
    driver: local
  grafana-data:
    driver: local
  loki-data:
    driver: local

networks:
  imsp-network:
    driver: bridge
