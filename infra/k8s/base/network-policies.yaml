# Default deny all ingress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: imsp
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
# Allow ingress to gateway from any (external traffic entry point)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gateway-ingress
  namespace: imsp
spec:
  podSelector:
    matchLabels:
      app: imsp-gateway
  ingress:
    - ports:
        - port: 8080
  policyTypes:
    - Ingress
---
# Allow gateway → api
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gateway-to-api
  namespace: imsp
spec:
  podSelector:
    matchLabels:
      app: imsp-api
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: imsp-gateway
      ports:
        - port: 8000
  policyTypes:
    - Ingress
---
# Allow api → neo4j
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-to-neo4j
  namespace: imsp
spec:
  podSelector:
    matchLabels:
      app: neo4j
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: imsp-api
      ports:
        - port: 7687
        - port: 7474
  policyTypes:
    - Ingress
---
# Allow gateway → keycloak
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gateway-to-keycloak
  namespace: imsp
spec:
  podSelector:
    matchLabels:
      app: keycloak
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: imsp-gateway
      ports:
        - port: 8180
  policyTypes:
    - Ingress
---
# Allow keycloak → keycloak-db
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-keycloak-to-db
  namespace: imsp
spec:
  podSelector:
    matchLabels:
      app: keycloak-db
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: keycloak
      ports:
        - port: 5432
  policyTypes:
    - Ingress
---
# Allow prometheus → all (metrics scraping)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape
  namespace: imsp
spec:
  podSelector: {}
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: prometheus
  policyTypes:
    - Ingress
---
# Allow gateway → zipkin
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-tracing-to-zipkin
  namespace: imsp
spec:
  podSelector:
    matchLabels:
      app: zipkin
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: imsp-gateway
        - podSelector:
            matchLabels:
              app: imsp-api
      ports:
        - port: 9411
  policyTypes:
    - Ingress
---
# Allow api → redis
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-to-redis
  namespace: imsp
spec:
  podSelector:
    matchLabels:
      app: redis
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: imsp-api
      ports:
        - port: 6379
  policyTypes:
    - Ingress
---
# Allow api → postgres
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-to-postgres
  namespace: imsp
spec:
  podSelector:
    matchLabels:
      app: imsp-postgres
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: imsp-api
      ports:
        - port: 5432
  policyTypes:
    - Ingress
---
# Allow api → qdrant
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-to-qdrant
  namespace: imsp
spec:
  podSelector:
    matchLabels:
      app: qdrant
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: imsp-api
      ports:
        - port: 6333
        - port: 6334
  policyTypes:
    - Ingress
---
# Egress: Default deny all egress, then allow specific
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-egress
  namespace: imsp
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # Allow DNS resolution
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow intra-namespace communication
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: imsp
---
# API → Neo4j, PostgreSQL, Redis, Qdrant, Keycloak
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-egress
  namespace: imsp
spec:
  podSelector:
    matchLabels:
      app: kg-api
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: imsp
      ports:
        - protocol: TCP
          port: 7687   # Neo4j Bolt
        - protocol: TCP
          port: 5432   # PostgreSQL
        - protocol: TCP
          port: 6379   # Redis
        - protocol: TCP
          port: 6333   # Qdrant
        - protocol: TCP
          port: 8080   # Keycloak
    # DNS
    - to: []
      ports:
        - protocol: UDP
          port: 53
---
# Gateway → API, Keycloak
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: gateway-egress
  namespace: imsp
spec:
  podSelector:
    matchLabels:
      app: gateway
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: imsp
      ports:
        - protocol: TCP
          port: 8000   # API
        - protocol: TCP
          port: 8080   # Keycloak
    # DNS
    - to: []
      ports:
        - protocol: UDP
          port: 53
