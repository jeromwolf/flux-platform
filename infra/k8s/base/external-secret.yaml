# External Secrets Operator — fetches secrets from external provider
# Requires: kubectl apply -f https://raw.githubusercontent.com/external-secrets/external-secrets/main/deploy/crds/bundle.yaml
# Or: helm install external-secrets external-secrets/external-secrets -n external-secrets --create-namespace
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: imsp-secrets
  namespace: imsp
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend  # Configure SecretStore separately per environment
    kind: ClusterSecretStore
  target:
    name: imsp-secrets
    creationPolicy: Owner
  data:
    - secretKey: NEO4J_USER
      remoteRef:
        key: imsp/neo4j
        property: username
    - secretKey: NEO4J_PASSWORD
      remoteRef:
        key: imsp/neo4j
        property: password
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: imsp/postgres
        property: password
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: imsp/redis
        property: password
    - secretKey: JWT_SECRET_KEY
      remoteRef:
        key: imsp/jwt
        property: secret-key
    - secretKey: KEYCLOAK_ADMIN
      remoteRef:
        key: imsp/keycloak
        property: admin-username
    - secretKey: KEYCLOAK_ADMIN_PASSWORD
      remoteRef:
        key: imsp/keycloak
        property: admin-password
    - secretKey: KC_DB_USERNAME
      remoteRef:
        key: imsp/keycloak-db
        property: username
    - secretKey: KC_DB_PASSWORD
      remoteRef:
        key: imsp/keycloak-db
        property: password
    - secretKey: AP_POSTGRES_USERNAME
      remoteRef:
        key: imsp/argo-db
        property: username
    - secretKey: AP_POSTGRES_PASSWORD
      remoteRef:
        key: imsp/argo-db
        property: password
    - secretKey: APP_API_KEY
      remoteRef:
        key: imsp/api
        property: api-key
