apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: imsp
  labels:
    app.kubernetes.io/name: imsp-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: imsp-platform
    app.kubernetes.io/managed-by: kustomize
spec:
  selector:
    app: imsp-api
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
  type: ClusterIP
