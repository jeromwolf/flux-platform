# ClusterSecretStore configuration
# Configure the backend per your infrastructure:
# - HashiCorp Vault: vault.hashicorp.com
# - AWS Secrets Manager: aws.amazon.com
# - GCP Secret Manager: cloud.google.com
# - Azure Key Vault: azure.microsoft.com
#
# Example for HashiCorp Vault:
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: "https://vault.example.com"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "imsp"
          serviceAccountRef:
            name: "imsp-sa"
