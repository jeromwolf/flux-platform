apiVersion: v1
kind: Service
metadata:
  name: qdrant
  namespace: imsp
  labels:
    app.kubernetes.io/name: imsp-qdrant
    app.kubernetes.io/component: vector-db
    app.kubernetes.io/part-of: imsp-platform
    app.kubernetes.io/managed-by: kustomize
spec:
  clusterIP: None
  selector:
    app: qdrant
  ports:
    - name: http
      port: 6333
      targetPort: 6333
      protocol: TCP
    - name: grpc
      port: 6334
      targetPort: 6334
      protocol: TCP
  type: ClusterIP
