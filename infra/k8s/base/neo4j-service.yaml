apiVersion: v1
kind: Service
metadata:
  name: neo4j
  namespace: imsp
  labels:
    app.kubernetes.io/name: imsp-neo4j
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: imsp-platform
    app.kubernetes.io/managed-by: kustomize
spec:
  selector:
    app: imsp-neo4j
  ports:
    - name: bolt
      port: 7687
      targetPort: 7687
      protocol: TCP
    - name: browser
      port: 7474
      targetPort: 7474
      protocol: TCP
  type: ClusterIP
