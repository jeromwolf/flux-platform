apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgresql-backup
  namespace: imsp
spec:
  schedule: "0 3 * * *"  # 매일 03:00 UTC
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: pg-backup
              image: postgres:16-alpine
              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: imsp-secrets
                      key: POSTGRES_PASSWORD
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  TIMESTAMP=$(date +%Y%m%d_%H%M%S)
                  BACKUP_DIR="/backups/postgresql"
                  mkdir -p "$BACKUP_DIR"

                  echo "Starting PostgreSQL backup: $TIMESTAMP"
                  pg_dump -h postgresql -U imsp -d imsp -Fc \
                    -f "$BACKUP_DIR/imsp_${TIMESTAMP}.dump"

                  echo "Backup completed: $BACKUP_DIR/imsp_${TIMESTAMP}.dump"
                  ls -la "$BACKUP_DIR/imsp_${TIMESTAMP}.dump"

                  # Retention: keep last 7 days
                  find "$BACKUP_DIR" -name "*.dump" -mtime +7 -delete
                  echo "Old backups cleaned up (7-day retention)"
              volumeMounts:
                - name: backup-storage
                  mountPath: /backups
              resources:
                requests:
                  memory: "128Mi"
                  cpu: "100m"
                limits:
                  memory: "256Mi"
                  cpu: "500m"
          volumes:
            - name: backup-storage
              persistentVolumeClaim:
                claimName: postgresql-backup-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgresql-backup-pvc
  namespace: imsp
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
