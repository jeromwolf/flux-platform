apiVersion: apps/v1
kind: Deployment
metadata:
  name: imsp-ui
  namespace: imsp
  labels:
    app: imsp-ui
    app.kubernetes.io/name: imsp-ui
    app.kubernetes.io/component: ui
    app.kubernetes.io/part-of: imsp-platform
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 2
  selector:
    matchLabels:
      app: imsp-ui
  template:
    metadata:
      labels:
        app: imsp-ui
        app.kubernetes.io/name: imsp-ui
        app.kubernetes.io/component: ui
        app.kubernetes.io/part-of: imsp-platform
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: imsp-ui
                topologyKey: kubernetes.io/hostname
      securityContext:
        runAsNonRoot: true
        runAsUser: 101  # nginx user
        runAsGroup: 101
        fsGroup: 101
      restartPolicy: Always
      terminationGracePeriodSeconds: 15
      containers:
        - name: ui
          image: imsp/ui:v0.1.0  # Pinned — updated by CD pipeline via kustomize set image
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          env:
            - name: VITE_API_BASE_URL
              value: "/api"
            - name: VITE_KEYCLOAK_URL
              valueFrom:
                configMapKeyRef:
                  name: imsp-config
                  key: KEYCLOAK_URL
            - name: VITE_KEYCLOAK_REALM
              valueFrom:
                configMapKeyRef:
                  name: imsp-config
                  key: KEYCLOAK_REALM
            - name: VITE_KEYCLOAK_CLIENT_ID
              value: "imsp-web"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
