apiVersion: apps/v1
kind: Deployment
metadata:
  name: zipkin
  namespace: imsp
  labels:
    app: zipkin
    app.kubernetes.io/name: zipkin
    app.kubernetes.io/component: tracing
    app.kubernetes.io/part-of: imsp-platform
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zipkin
  template:
    metadata:
      labels:
        app: zipkin
        app.kubernetes.io/name: zipkin
        app.kubernetes.io/component: tracing
        app.kubernetes.io/part-of: imsp-platform
    spec:
      containers:
        - name: zipkin
          image: openzipkin/zipkin:3.1
          ports:
            - containerPort: 9411
              name: http
          env:
            - name: STORAGE_TYPE
              value: mem
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 9411
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 9411
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: zipkin
  namespace: imsp
  labels:
    app: zipkin
    app.kubernetes.io/name: zipkin
    app.kubernetes.io/component: tracing
    app.kubernetes.io/part-of: imsp-platform
    app.kubernetes.io/managed-by: kustomize
spec:
  selector:
    app: zipkin
  ports:
    - port: 9411
      targetPort: 9411
      name: http
