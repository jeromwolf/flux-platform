apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: imsp-postgres
  namespace: imsp
  labels:
    app.kubernetes.io/name: imsp-postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: imsp-platform
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 1
  serviceName: postgres
  selector:
    matchLabels:
      app: imsp-postgres
  template:
    metadata:
      labels:
        app: imsp-postgres
        app.kubernetes.io/name: imsp-postgres
        app.kubernetes.io/component: database
        app.kubernetes.io/part-of: imsp-platform
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      initContainers:
        - name: copy-init-script
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - cp /scripts/init-imsp-db.sh /docker-entrypoint-initdb.d/02-create-imsp-db.sh && chmod +x /docker-entrypoint-initdb.d/02-create-imsp-db.sh
          volumeMounts:
            - name: init-scripts
              mountPath: /scripts
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      containers:
        - name: postgres
          image: postgres:14.4
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_DB
              value: activepieces
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: imsp-secrets
                  key: AP_POSTGRES_USERNAME
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: imsp-secrets
                  key: AP_POSTGRES_PASSWORD
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: init-scripts
          configMap:
            name: postgres-init-scripts
            defaultMode: 0755
        - name: initdb
          emptyDir: {}
      restartPolicy: Always
      terminationGracePeriodSeconds: 60
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
        labels:
          app.kubernetes.io/name: imsp-postgres
          app.kubernetes.io/component: database
          app.kubernetes.io/part-of: imsp-platform
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
