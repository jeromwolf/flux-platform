apiVersion: v1
kind: ConfigMap
metadata:
  name: imsp-config
  namespace: imsp
  labels:
    app.kubernetes.io/part-of: imsp-platform
    app.kubernetes.io/managed-by: kustomize
data:
  NEO4J_URI: "bolt://neo4j:7687"
  NEO4J_DATABASE: "neo4j"
  ENV: "production"
  LOG_FORMAT: "json"
  LOG_LEVEL: "INFO"
  CORS_ALLOWED_ORIGINS: "http://localhost:3000"
  KEYCLOAK_URL: "http://imsp-keycloak:8180"
  KEYCLOAK_REALM: "imsp"
  KEYCLOAK_CLIENT_ID: "imsp-api"
