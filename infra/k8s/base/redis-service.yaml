apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: imsp
  labels:
    app.kubernetes.io/name: imsp-redis
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: imsp-platform
    app.kubernetes.io/managed-by: kustomize
spec:
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP
  type: ClusterIP
