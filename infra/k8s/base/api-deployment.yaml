apiVersion: apps/v1
kind: Deployment
metadata:
  name: imsp-api
  namespace: imsp
  labels:
    app.kubernetes.io/name: imsp-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: imsp-platform
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 2
  selector:
    matchLabels:
      app: imsp-api
  template:
    metadata:
      labels:
        app: imsp-api
        app.kubernetes.io/name: imsp-api
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: imsp-platform
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: imsp-api
                topologyKey: kubernetes.io/hostname
      # Run as non-root for security best practices
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: api
          image: imsp/kg-api:v0.1.0  # Pinned — updated by CD pipeline via kustomize set image
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: PYTHONPATH
              value: "/app/core:/app/domains"
          envFrom:
            - configMapRef:
                name: imsp-config
            - secretRef:
                name: imsp-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
