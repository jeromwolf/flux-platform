apiVersion: v1
kind: Secret
metadata:
  name: imsp-secrets
  namespace: imsp
  labels:
    app.kubernetes.io/part-of: imsp-platform
    app.kubernetes.io/managed-by: kustomize
  annotations:
    # WARNING: Replace all CHANGE_ME values before deploying to production.
    # Consider using an external secrets manager (e.g., Vault, AWS Secrets Manager)
    # or Sealed Secrets for GitOps workflows.
type: Opaque
stringData:
  NEO4J_USER: "neo4j"
  NEO4J_PASSWORD: "CHANGE_ME"
  JWT_SECRET_KEY: "CHANGE_ME"
  APP_API_KEY: "CHANGE_ME"
  KEYCLOAK_ADMIN: "admin"
  KEYCLOAK_ADMIN_PASSWORD: "CHANGE_ME"
  KC_DB_USERNAME: "postgres"
  KC_DB_PASSWORD: "CHANGE_ME"
