apiVersion: apps/v1
kind: Deployment
metadata:
  name: imsp-keycloak
spec:
  template:
    spec:
      containers:
        - name: keycloak
          # 프로덕션 모드: start --optimized (TLS 강제, hostname 검증, HTTP 비활성화)
          # 개발 모드(start-dev)는 docker-compose.yml 참조
          args:
            - start
            - --optimized
            - --import-realm
          env:
            - name: KC_HOSTNAME_STRICT
              value: "true"
            - name: KC_HTTP_ENABLED
              value: "false"
            - name: KC_PROXY
              value: "edge"
            - name: KC_HOSTNAME
              value: "auth.imsp.kriso.re.kr"
            - name: KC_HEALTH_ENABLED
              value: "true"
            - name: KC_METRICS_ENABLED
              value: "true"
