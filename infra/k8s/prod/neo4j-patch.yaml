apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: neo4j
spec:
  template:
    spec:
      containers:
        - name: neo4j
          resources:
            limits:
              memory: "4Gi"
              cpu: "2000m"
          env:
            - name: NEO4J_server_memory_heap_initial__size
              value: "2G"
            - name: NEO4J_server_memory_heap_max__size
              value: "2G"
            - name: NEO4J_server_memory_pagecache_size
              value: "2G"
