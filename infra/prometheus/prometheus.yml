# Prometheus configuration for IMSP Platform
# Scrapes the Maritime KG API /metrics endpoint

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

# Scrape targets
scrape_configs:
  # Maritime KG API metrics
  - job_name: "imsp-api"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: "maritime-api"
          environment: "development"
    scrape_interval: 10s

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Neo4j metrics (if enterprise edition)
  # - job_name: "neo4j"
  #   metrics_path: "/metrics"
  #   static_configs:
  #     - targets: ["neo4j:2004"]
