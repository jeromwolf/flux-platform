# Prometheus configuration for IMSP Platform
# Scrapes the Maritime KG API /metrics endpoint

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

# Scrape targets
scrape_configs:
  # Maritime KG API metrics
  - job_name: "imsp-api"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: "maritime-api"
          environment: "development"
    scrape_interval: 10s

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # API Gateway metrics
  - job_name: 'imsp-gateway'
    scrape_interval: 10s
    static_configs:
      - targets: ['gateway:8080']
    metrics_path: '/metrics'

  # Keycloak metrics
  - job_name: 'keycloak'
    scrape_interval: 30s
    static_configs:
      - targets: ['keycloak:8080']
    metrics_path: '/metrics'

  # Zipkin tracing server metrics
  - job_name: 'zipkin'
    scrape_interval: 15s
    static_configs:
      - targets: ['zipkin:9411']
    metrics_path: '/prometheus'

  # Neo4j metrics (if enterprise edition)
  # - job_name: "neo4j"
  #   metrics_path: "/metrics"
  #   static_configs:
  #     - targets: ["neo4j:2004"]
